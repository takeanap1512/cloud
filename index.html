<!DOCTYPE html>
<html>
<head>
  <title>Cloud Drive</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      text-align: center;
    }
    .container {
      width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
    button {
      padding: 8px;
      background: green;
      color: white;
      border: none;
      margin-top: 5px;
    }
    .file {
      margin-top: 10px;
      background: #eee;
      padding: 10px;
    }
    img {
      max-width: 100%;
      margin-top: 10px;
    }
  </style>
</head>

<body>
<div class="container">
  <h2>Cloud Drive</h2>

  <form id="form">
    <input type="file" name="file">
    <button>Upload</button>
  </form>

  <div id="files"></div>
</div>

<script>
async function loadFiles() {
  const res = await fetch("http://127.0.0.1:5000/files");
  const files = await res.json();

  let html = "";
  files.forEach(f => {
    html += `
      <div class="file">
        <p>${f.name}</p>
        <a href="${f.url}" target="_blank">Download</a><br>
        <button onclick="deleteFile('${f.public_id}')">Delete</button>
        ${f.isImage ? `<img src="${f.url}" />` : ""}
      </div>
    `;
  });

  document.getElementById("files").innerHTML = html;
}

async function deleteFile(id) {
  await fetch(`http://127.0.0.1:5000/delete/${id}`, {
    method: "DELETE"
  });
  loadFiles();
}

document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();
  const data = new FormData(e.target);

  await fetch("http://127.0.0.1:5000/upload", {
    method: "POST",
    body: data
  });

  loadFiles();
};

loadFiles();
</script>
</body>
</html>
