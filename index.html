<!DOCTYPE html>
<html>
<head>
  <title>Cloud Drive</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      text-align: center;
    }
    .container {
      width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-top: 50px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    button {
      padding: 8px;
      background: green;
      color: white;
      border: none;
      margin-top: 5px;
      cursor: pointer;
      border-radius: 5px;
    }
    .delete-btn {
      background: red;
      margin-left: 10px;
    }
    .file {
      margin-top: 10px;
      background: #eee;
      padding: 10px;
      border-radius: 5px;
    }
    img {
      max-width: 100%;
      margin-top: 10px;
    }
    #status {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>
<div class="container">
  <h2>Cloud Drive</h2>

  <form id="form">
    <input type="file" name="file" required>
    <button>Upload</button>
  </form>

  <div id="status"></div>
  <div id="files"></div>
</div>

<script>


async function loadFiles() {
  const res = await fetch("/files"); 
  const files = await res.json();

  let html = "";

  files.forEach(f => {
    html += `
      <div class="file">
        <p>${f.name}</p>
        <a href="${f.url}" target="_blank">Download</a>
        <button class="delete-btn" onclick="deleteFile('${f.public_id}')">Delete</button>
        ${f.isImage ? `<img src="${f.url}" />` : ""}
      </div>
    `;
  });

  document.getElementById("files").innerHTML = html;
}


document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();

  const status = document.getElementById("status");
  status.innerText = "Uploading... ⏳";

  const data = new FormData(e.target);

  try {
    const res = await fetch("/upload", {
      method: "POST",
      body: data
    });

    if (res.ok) {
      status.innerText = "Upload successful ";
      loadFiles();
    } else {
      status.innerText = "Upload failed ";
    }
  } catch (err) {
    status.innerText = "Error occurred ";
  }
};

async function deleteFile(id) {
  const confirmDelete = confirm("Are you sure?");
  if (!confirmDelete) return;

  await fetch(`/delete/${id}`, {
    method: "DELETE"
  });

  document.getElementById("status").innerText = "File deleted 🗑️";
  loadFiles();
}


loadFiles();

</script>
</body>
</html>
